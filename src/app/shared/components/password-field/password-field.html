<div class="password-field" [class.password-field--disabled]="disabled">

  @if (label) {
    <label class="password-field__label" [attr.for]="fieldId">
      {{ label }}
      @if (required) {
        <span class="password-field__label-required">*</span>
      }
    </label>
  }

  <div class="password-field__box" [class.password-field__box--error]="error">
    <span class="material-symbols-outlined password-field__icon">lock</span>
    <input
      [id]="fieldId"
      class="password-field__input"
      [type]="showPassword() ? 'text' : 'password'"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      (input)="onInput($event)"
      (blur)="onBlur()"
      autocomplete="current-password"
    />
    <button
      class="password-field__toggle"
      type="button"
      (click)="toggleVisibility()"
      [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Exibir senha'"
    >
      <span class="material-symbols-outlined">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
    </button>
  </div>

  @if (error && errorMessage) {
    <div class="password-field__error-row">
      <span class="material-symbols-outlined password-field__error-icon">error_outline</span>
      <span class="password-field__error-text">{{ errorMessage }}</span>
    </div>
  }

</div>
