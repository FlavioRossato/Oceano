<div class="dados-pessoais">
  <header class="dados-pessoais__header">
    <p class="dados-pessoais__eyebrow">Etapa 2 de 9</p>
    <h1 class="dados-pessoais__title">Dados pessoais</h1>
    <p class="dados-pessoais__subtitle">Precisamos confirmar algumas informações para personalizar o seu plano.</p>
  </header>

  <form class="dados-pessoais__form" (submit)="$event.preventDefault()">

    <div class="dados-pessoais__field dados-pessoais__field--full">
      <leme-text-field label="NOME COMPLETO" [required]="true" placeholder="Seu nome completo" [(ngModel)]="nomeCompleto" name="nomeCompleto" />
    </div>

    <div class="dados-pessoais__row">
      <div class="dados-pessoais__field">
        <leme-text-field label="CPF" [required]="true" placeholder="000.000.000-00" [(ngModel)]="cpf" name="cpf" />
      </div>
      <div class="dados-pessoais__field">
        <leme-text-field label="DATA DE NASCIMENTO" [required]="true" placeholder="DD/MM/AAAA" [(ngModel)]="dataNascimento" name="dataNascimento" />
      </div>
    </div>

    <div class="dados-pessoais__row">
      <div class="dados-pessoais__field">
        <leme-select label="SEXO" [required]="true" placeholder="Selecione" [items]="sexoOptions" [(ngModel)]="sexo" name="sexo" />
      </div>
      <div class="dados-pessoais__field">
        <leme-select label="ESTADO CIVIL" [required]="true" placeholder="Selecione" [items]="estadoCivilOptions" [(ngModel)]="estadoCivil" name="estadoCivil" />
      </div>
    </div>

    <div class="dados-pessoais__row">
      <div class="dados-pessoais__field">
        <leme-select label="ESCOLARIDADE" [required]="true" placeholder="Selecione" [items]="escolaridadeOptions" [(ngModel)]="escolaridade" name="escolaridade" />
      </div>
      <div class="dados-pessoais__field">
        <leme-select label="TIPO DE DOCUMENTO" [required]="true" placeholder="Selecione" [items]="tipoDocumentoOptions" [(ngModel)]="tipoDocumento" name="tipoDocumento" />
      </div>
    </div>

    <div class="dados-pessoais__row">
      <div class="dados-pessoais__field">
        <leme-text-field label="NÚMERO DO DOCUMENTO" [required]="true" placeholder="00.000.000-0" [(ngModel)]="numeroDocumento" name="numeroDocumento" />
      </div>
      <div class="dados-pessoais__field">
        <leme-text-field label="DATA DE EMISSÃO" [required]="true" placeholder="DD/MM/AAAA" [(ngModel)]="dataEmissao" name="dataEmissao" />
      </div>
    </div>

    <div class="dados-pessoais__row">
      <div class="dados-pessoais__field">
        <leme-text-field label="NOME DA MÃE" [required]="true" placeholder="Nome completo da mãe" [(ngModel)]="nomeMae" name="nomeMae" />
      </div>
      <div class="dados-pessoais__field">
        <leme-text-field label="NOME DO PAI" placeholder="Nome completo do pai" [(ngModel)]="nomePai" name="nomePai" />
      </div>
    </div>

  </form>
</div>
