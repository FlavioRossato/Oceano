<div class="empresa">
  <header class="empresa__header">
    <p class="empresa__eyebrow">Etapa 1 de 6</p>
    <h1 class="empresa__title">Sua empresa</h1>
    <p class="empresa__subtitle">
      Associamos você ao plano da sua empresa para personalizar as condições.
    </p>
  </header>

  <form class="empresa__form" (submit)="$event.preventDefault()">

    <div class="empresa__field empresa__field--full">
      <leme-select
        label="EMPRESA ONDE TRABALHA"
        placeholder="Selecione a empresa"
        [items]="empresaOptions"
        [(ngModel)]="empresa"
        name="empresa"
      />
    </div>

    <div class="empresa__row">
      <div class="empresa__field">
        <leme-text-field
          label="MATRÍCULA"
          placeholder="Informe sua matrícula"
          [(ngModel)]="matricula"
          name="matricula"
        />
      </div>
      <div class="empresa__field">
        <leme-text-field
          label="CARGO"
          placeholder="Seu cargo"
          [(ngModel)]="cargo"
          name="cargo"
        />
      </div>
    </div>

    <div class="empresa__row">
      <div class="empresa__field">
        <leme-text-field
          label="SALÁRIO MENSAL"
          placeholder="R$ 0,00"
          [(ngModel)]="salario"
          name="salario"
        />
      </div>
      <div class="empresa__field">
        <div class="empresa__date">
          <label class="empresa__date-label" for="data-admissao">DATA DE ADMISSÃO</label>
          <div class="empresa__date-box">
            <input
              id="data-admissao"
              class="empresa__date-input"
              type="text"
              placeholder="DD/MM/AAAA"
              [(ngModel)]="dataAdmissao"
              name="dataAdmissao"
            />
            <span class="material-symbols-outlined empresa__date-icon">calendar_month</span>
          </div>
        </div>
      </div>
    </div>

    <div class="empresa__field empresa__field--full">
      <leme-select
        label="RELAÇÃO COM A EMPRESA"
        placeholder="Selecione"
        [items]="relacaoOptions"
        [(ngModel)]="relacao"
        name="relacao"
      />
    </div>

  </form>
</div>
