<div class="contato-endereco">
  <header class="contato-endereco__header">
    <p class="contato-endereco__eyebrow">Etapa 3 de 9</p>
    <h1 class="contato-endereco__title">Contato &amp; endereço</h1>
    <p class="contato-endereco__subtitle">Informe seus dados de contato e endereço residencial.</p>
  </header>

  <form class="contato-endereco__form" (submit)="$event.preventDefault()">

    <section class="contato-endereco__section">
      <div class="contato-endereco__section-header">
        <h2 class="contato-endereco__section-title">Endereço</h2>
        <p class="contato-endereco__section-subtitle">Informe seu endereço para dar continuidade à solicitação.</p>
      </div>

      <leme-switch label="Reside no exterior?" [(ngModel)]="resideExterior" name="resideExterior" />

      @if (!resideExterior) {
        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-select label="TIPO DE ENDEREÇO" [required]="true" placeholder="Selecione" [items]="tipoEnderecoOptions" [(ngModel)]="tipoEndereco" name="tipoEndereco" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="CEP" [required]="true" placeholder="00000-000" [(ngModel)]="cep" name="cep" />
          </div>
        </div>

        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-text-field label="ENDEREÇO" [required]="true" placeholder="Rua, avenida..." [(ngModel)]="endereco" name="endereco" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="NÚMERO" [required]="true" placeholder="Número" [(ngModel)]="numero" name="numero" />
          </div>
        </div>

        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-text-field label="COMPLEMENTO" [required]="true" placeholder="Apto, bloco..." [(ngModel)]="complemento" name="complemento" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="BAIRRO" [required]="true" placeholder="Bairro" [(ngModel)]="bairro" name="bairro" />
          </div>
        </div>

        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-select label="ESTADO" [required]="true" placeholder="Selecione" [items]="ufOptions" [(ngModel)]="estado" name="estado" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="CIDADE" [required]="true" placeholder="Cidade" [(ngModel)]="cidade" name="cidade" />
          </div>
        </div>
      } @else {
        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-text-field label="PAÍS" [required]="true" placeholder="País" [(ngModel)]="pais" name="pais" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="NIF" [required]="true" placeholder="NIF" [(ngModel)]="nif" name="nif" />
          </div>
        </div>

        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-text-field label="COMPLEMENTO" [required]="true" placeholder="Apto, bloco..." [(ngModel)]="complemento" name="complemento" />
          </div>
        </div>
      }

      <leme-checkbox label="Tornar endereço principal" [(ngModel)]="enderecoPrincipal" name="enderecoPrincipal" />
    </section>

    <div class="contato-endereco__divider"></div>

    <section class="contato-endereco__section">
      <div class="contato-endereco__section-header">
        <h2 class="contato-endereco__section-title">Contatos</h2>
        <p class="contato-endereco__section-subtitle">Informe seus meios de contato para receber atualizações.</p>
      </div>

      <div class="contato-endereco__group">
        <p class="contato-endereco__group-label">Telefone</p>

        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-select label="TIPO DE TELEFONE" [required]="true" placeholder="Selecione" [items]="tipoContatoOptions" [(ngModel)]="telefoneTipo" name="telefoneTipo" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="TELEFONE" [required]="true" placeholder="(00) 00000-0000" [(ngModel)]="telefone" name="telefone" />
          </div>
        </div>

        <leme-checkbox label="Tornar telefone principal" [(ngModel)]="telefonePrincipal" name="telefonePrincipal" />

        <div class="contato-endereco__row">
          <leme-switch label="Aceita comunicação via whatsapp?" [(ngModel)]="aceitaWhatsapp" name="aceitaWhatsapp" />
          <leme-switch label="Aceita comunicação via SMS?" [(ngModel)]="aceitaSms" name="aceitaSms" />
        </div>

        <leme-message
          severity="Informative"
          [showTitle]="false"
          message="Alguns comunicados podem ser enviados por whatsApp e SMS quando necessário."
        />
      </div>

      <div class="contato-endereco__group">
        <p class="contato-endereco__group-label">E-mail</p>

        <div class="contato-endereco__row">
          <div class="contato-endereco__field">
            <leme-select label="TIPO DE EMAIL" [required]="true" placeholder="Selecione" [items]="tipoContatoOptions" [(ngModel)]="emailTipo" name="emailTipo" />
          </div>
          <div class="contato-endereco__field">
            <leme-text-field label="EMAIL" [required]="true" placeholder="seu@email.com" [(ngModel)]="email" name="email" />
          </div>
        </div>

        <leme-checkbox label="Tornar e-mail principal" [(ngModel)]="emailPrincipal" name="emailPrincipal" />
      </div>
    </section>

  </form>
</div>
